name: token_ui
description: >
  Token-driven Flutter UI kit. Hosts can override colors / text styles;
  missing theme falls back to built-in light/dark defaults.
version: 0.1.0
homepage: https://github.com/acsweets/packages
repository: https://github.com/acsweets/packages
publish_to: none

environment:
  sdk: ^3.9.2
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_screenutil: ^5.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
